<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket Desk Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Marquee header -->
    <header class="marquee">
      <div class="bulbs" aria-hidden="true"></div>
      <div class="marquee-inner">
        <div class="mask-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 3v18M3 12h18M6 6l3 3M18 6l-3 3M6 18l3-3M18 18l-3-3"/>
          </svg>
        </div>
        <div>
          <p class="eyebrow">AI DOUBT DESK</p>
          <h1>CINEBOT</h1>
        </div>
      </div>
      <div class="bulbs" aria-hidden="true"></div>
    </header>

    <!-- Chat window -->
    <main class="chat-shell">
      <section class="chat-window" id="chatWindow" aria-live="polite">
        <!-- messages injected by JS -->
      </section>

      <div class="quick-chips" id="quickChips" aria-label="Suggested questions">
        
      </div>

      <form class="composer" id="composer">
        <span class="composer-label">Ask the bot</span>
        <input
          type="text"
          id="userInput"
          placeholder="e.g. how do I cancel my ticket?"
          autocomplete="off"
        />
        <button type="submit" aria-label="Send message">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 12h15M13 6l6 6-6 6"/>
          </svg>
        </button>
      </form>
    </main>

    <footer>
      <p>CINEBOT— a practice chatbot project running on local JSON, not a real ticketing platform.</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
